<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Microsoft Teams Chat View</title>
  <style>
    :root{
      --bg:#f3f2f1;
      --surface:#ffffff;
      --surface-2:#f8f8f8;
      --surface-3:#edebe9;
      --border:#e1dfdd;
      --text:#242424;
      --muted:#605e5c;
      --brand:#6264a7;
      --brand-dark:#4f52b2;
      --brand-soft:#eef0ff;
      --success:#107c10;
      --danger:#c4314b;
      --shadow:0 10px 26px rgba(0,0,0,.08);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      height:100%;
      font-family:"Segoe UI", Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    body{
      display:grid;
      grid-template-columns:68px 320px 1fr 300px;
      grid-template-rows:60px 1fr;
      grid-template-areas:
        "rail chatlist topbar topbar"
        "rail chatlist main right";
    }

    button,input,textarea{font:inherit}

    .rail{
      grid-area:rail;
      background:#1f1f1f;
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:12px 8px;
      gap:8px;
    }

    .rail-logo{
      width:42px;
      height:42px;
      border-radius:14px;
      background:linear-gradient(135deg,#7b83eb,#5b5fc7);
      display:grid;
      place-items:center;
      font-weight:800;
      margin-bottom:6px;
    }

    .rail-btn{
      width:46px;
      height:46px;
      border:none;
      border-radius:14px;
      background:transparent;
      color:#fff;
      cursor:pointer;
      font-size:18px;
      position:relative;
    }

    .rail-btn:hover{background:rgba(255,255,255,.08)}
    .rail-btn.active{background:rgba(255,255,255,.12)}
    .rail-btn.active::before{
      content:"";
      position:absolute;
      left:-8px;
      top:10px;
      bottom:10px;
      width:4px;
      border-radius:999px;
      background:#fff;
    }

    .rail-spacer{flex:1}

    .topbar{
      grid-area:topbar;
      background:var(--surface);
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:0 16px;
    }

    .topbar-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .search{
      display:flex;
      align-items:center;
      gap:10px;
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 14px;
      width:min(560px,100%);
      min-width:180px;
    }

    .search input{
      width:100%;
      border:none;
      background:transparent;
      outline:none;
      color:var(--text);
      font-size:14px;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-shrink:0;
    }

    .icon-btn{
      width:36px;
      height:36px;
      border:none;
      border-radius:12px;
      background:transparent;
      cursor:pointer;
      font-size:16px;
    }

    .icon-btn:hover{background:var(--surface-2)}

    .profile{
      display:flex;
      align-items:center;
      gap:10px;
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:999px;
      padding:5px 10px 5px 5px;
    }

    .avatar{
      width:32px;
      height:32px;
      border-radius:50%;
      display:grid;
      place-items:center;
      color:#fff;
      font-weight:700;
      background:linear-gradient(135deg,#9a6df0,#5b5fc7);
      position:relative;
      flex-shrink:0;
    }

    .avatar::after{
      content:"";
      position:absolute;
      right:0;
      bottom:0;
      width:10px;
      height:10px;
      border-radius:50%;
      background:#34c759;
      box-shadow:0 0 0 2px #fff;
    }

    .chatlist{
      grid-area:chatlist;
      background:var(--surface);
      border-right:1px solid var(--border);
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .chatlist-header{
      padding:16px;
      border-bottom:1px solid var(--border);
    }

    .chatlist-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .chatlist-top h2{
      margin:0;
      font-size:24px;
    }

    .new-chat-btn{
      border:none;
      background:var(--brand);
      color:#fff;
      padding:10px 14px;
      border-radius:12px;
      font-weight:600;
      cursor:pointer;
    }

    .new-chat-btn:hover{background:var(--brand-dark)}

    .chatlist-filter{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .filter-pill{
      border:1px solid var(--border);
      background:var(--surface-2);
      color:var(--text);
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      cursor:pointer;
    }

    .filter-pill.active{
      background:var(--brand-soft);
      border-color:#cfd4ff;
      color:var(--brand-dark);
      font-weight:600;
    }

    .chat-items{
      overflow:auto;
      padding:10px 8px 16px;
    }

    .chat-group-label{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
      font-weight:700;
      padding:10px 10px 6px;
    }

    .chat-item{
      display:flex;
      align-items:flex-start;
      gap:12px;
      width:100%;
      border:none;
      background:transparent;
      text-align:left;
      padding:12px 10px;
      border-radius:14px;
      cursor:pointer;
      margin-bottom:4px;
    }

    .chat-item:hover{background:var(--surface-2)}
    .chat-item.active{
      background:#ecebff;
    }

    .chat-item-avatar{
      width:40px;
      height:40px;
      border-radius:50%;
      display:grid;
      place-items:center;
      color:#fff;
      font-weight:700;
      flex-shrink:0;
      position:relative;
    }

    .chat-item-avatar.online::after{
      content:"";
      position:absolute;
      right:1px;
      bottom:1px;
      width:10px;
      height:10px;
      border-radius:50%;
      background:#34c759;
      box-shadow:0 0 0 2px #fff;
    }

    .chat-item-body{
      min-width:0;
      flex:1;
    }

    .chat-item-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:4px;
    }

    .chat-item-title{
      font-weight:700;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chat-item-time{
      font-size:12px;
      color:var(--muted);
      flex-shrink:0;
    }

    .chat-item-sub{
      font-size:13px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chat-item.active .chat-item-sub{
      color:#49454f;
    }

    .chat-item-meta{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:6px;
    }

    .unread{
      min-width:20px;
      height:20px;
      border-radius:999px;
      background:var(--brand);
      color:#fff;
      font-size:11px;
      font-weight:700;
      display:grid;
      place-items:center;
      padding:0 6px;
    }

    .main{
      grid-area:main;
      display:flex;
      flex-direction:column;
      min-width:0;
      min-height:0;
    }

    .chat-header{
      background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .chat-header-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .chat-header-avatar{
      width:40px;
      height:40px;
      border-radius:50%;
      display:grid;
      place-items:center;
      color:#fff;
      font-weight:700;
      flex-shrink:0;
      position:relative;
    }

    .chat-header-avatar.online::after{
      content:"";
      position:absolute;
      right:1px;
      bottom:1px;
      width:10px;
      height:10px;
      border-radius:50%;
      background:#34c759;
      box-shadow:0 0 0 2px #fff;
    }

    .chat-header-text{
      min-width:0;
    }

    .chat-header-text h3{
      margin:0;
      font-size:18px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chat-header-text p{
      margin:3px 0 0;
      font-size:13px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chat-header-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .ghost-btn,.primary-btn{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-weight:600;
      cursor:pointer;
    }

    .ghost-btn{
      background:var(--surface-2);
      border:1px solid var(--border);
      color:var(--text);
    }

    .ghost-btn:hover{background:var(--surface-3)}

    .primary-btn{
      background:var(--brand);
      color:#fff;
    }

    .primary-btn:hover{background:var(--brand-dark)}

    .messages{
      flex:1;
      overflow:auto;
      padding:18px;
      background:linear-gradient(to bottom,#f8f7ff 0,#f8f7ff 110px,var(--bg) 110px,var(--bg) 100%);
    }

    .date-sep{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      margin:8px 0 18px;
    }

    .message{
      display:flex;
      gap:12px;
      align-items:flex-start;
      margin-bottom:18px;
    }

    .msg-avatar{
      width:38px;
      height:38px;
      border-radius:50%;
      display:grid;
      place-items:center;
      color:#fff;
      font-weight:700;
      flex-shrink:0;
    }

    .message-content{
      min-width:0;
      max-width:850px;
      width:100%;
    }

    .msg-top{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:6px;
    }

    .msg-name{font-weight:700}
    .msg-time{
      color:var(--muted);
      font-size:12px;
    }

    .msg-bubble{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      padding:13px 14px;
      line-height:1.45;
    }

    .msg-bubble p{margin:0 0 8px}
    .msg-bubble p:last-child{margin-bottom:0}

    .card{
      margin-top:10px;
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
    }

    .card strong{
      display:block;
      margin-bottom:6px;
    }

    .composer{
      background:var(--surface);
      border-top:1px solid var(--border);
      padding:14px 18px 18px;
    }

    .composer-tools{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .tool-chip{
      border:1px solid var(--border);
      background:var(--surface-2);
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      cursor:pointer;
    }

    .composer-box{
      display:flex;
      flex-direction:column;
      gap:10px;
      border:1px solid var(--border);
      background:var(--surface-2);
      border-radius:18px;
      padding:12px;
    }

    .composer-box textarea{
      width:100%;
      min-height:84px;
      resize:none;
      border:none;
      outline:none;
      background:transparent;
      font-size:15px;
      color:var(--text);
      font-family:inherit;
    }

    .composer-actions{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .composer-left,.composer-right{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .send-btn{
      border:none;
      background:var(--brand);
      color:#fff;
      padding:10px 18px;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
    }

    .send-btn:hover{background:var(--brand-dark)}

    .right{
      grid-area:right;
      background:var(--surface);
      border-left:1px solid var(--border);
      display:flex;
      flex-direction:column;
    }

    .right-section{
      padding:18px;
      border-bottom:1px solid var(--border);
    }

    .right-section h4{
      margin:0 0 12px;
      font-size:16px;
    }

    .info-card{
      border:1px solid var(--border);
      border-radius:16px;
      background:var(--surface-2);
      padding:14px;
      line-height:1.45;
      font-size:13px;
      color:var(--muted);
    }

    .people-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .person{
      display:flex;
      align-items:center;
      gap:10px;
      padding:8px 0;
      border-bottom:1px solid var(--border);
    }

    .person:last-child{border-bottom:none}

    .mini-avatar{
      width:34px;
      height:34px;
      border-radius:50%;
      display:grid;
      place-items:center;
      color:#fff;
      font-weight:700;
      flex-shrink:0;
    }

    .person-info strong{
      display:block;
      font-size:14px;
    }

    .person-info span{
      font-size:12px;
      color:var(--muted);
    }

    .toast{
      position:fixed;
      right:20px;
      bottom:20px;
      background:#1f1f1f;
      color:#fff;
      padding:14px 16px;
      border-radius:14px;
      box-shadow:var(--shadow);
      opacity:0;
      transform:translateY(10px);
      pointer-events:none;
      transition:.25s ease;
      z-index:50;
      max-width:320px;
    }

    .toast.show{
      opacity:1;
      transform:translateY(0);
    }

    @media (max-width: 1200px){
      body{
        grid-template-columns:68px 320px 1fr;
        grid-template-areas:
          "rail chatlist topbar"
          "rail chatlist main";
      }
      .right{display:none}
    }

    @media (max-width: 900px){
      body{
        grid-template-columns:68px 1fr;
        grid-template-areas:
          "rail topbar"
          "rail main";
      }
      .chatlist{display:none}
      .profile div:not(.avatar){display:none}
    }
  </style>
</head>

    const messagesEl = document.getElementById("messages");
    const peopleListEl = document.getElementById("peopleList");
    const titleEl = document.getElementById("chatTitle");
    const subtitleEl = document.getElementById("chatSubtitle");
    const headerAvatarEl = document.getElementById("headerAvatar");
    const infoCardEl = document.getElementById("infoCard");
    const chatItems = document.querySelectorAll(".chat-item");
    const input = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const searchInput = document.getElementById("searchInput");
    const toast = document.getElementById("toast");

    let currentTopic = "it-escalation";

    function showToast(text){
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    function buildMessage(message){
      const wrapper = document.createElement("div");
      wrapper.className = "message searchable";
      wrapper.innerHTML = `
        <div class="msg-avatar" style="background:${message.color};">${message.initials}</div>
        <div class="message-content">
          <div class="msg-top">
            <span class="msg-name">${message.name}</span>
            <span class="msg-time">${message.time}</span>
          </div>
          <div class="msg-bubble">
            <p>${message.text}</p>
            ${message.cardTitle ? `<div class="card"><strong>${message.cardTitle}</strong>${message.cardBody}</div>` : ""}
          </div>
        </div>
      `;
      return wrapper;
    }

    function renderPeople(people){
      peopleListEl.innerHTML = "";
      people.forEach(person => {
        const item = document.createElement("div");
        item.className = "person";
        item.innerHTML = `
          <div class="mini-avatar" style="background:${person.color};">${person.initials}</div>
          <div class="person-info">
            <strong>${person.name}</strong>
            <span>${person.status}</span>
          </div>
        `;
        peopleListEl.appendChild(item);
      });
    }

    function renderChat(topic){
      currentTopic = topic;
      const data = chatData[topic];

      titleEl.textContent = data.title;
      subtitleEl.textContent = data.subtitle;
      headerAvatarEl.textContent = data.avatar;
      headerAvatarEl.style.background = data.avatarColor;
      infoCardEl.textContent = data.info;

      messagesEl.innerHTML = `<div class="date-sep">Today</div>`;
      data.messages.forEach(msg => messagesEl.appendChild(buildMessage(msg)));
      renderPeople(data.people);
      applySearch();
    }

    function applySearch(){
      const term = searchInput.value.trim().toLowerCase();
      document.querySelectorAll(".searchable").forEach(item => {
        const match = item.innerText.toLowerCase().includes(term);
        item.style.display = match || !term ? "" : "none";
      });
    }

    chatItems.forEach(item => {
      item.addEventListener("click", () => {
        if (!item.dataset.topic) return;
        chatItems.forEach(i => i.classList.remove("active"));
        item.classList.add("active");
        renderChat(item.dataset.topic);
      });
    });

    function sendMessage(){
      const text = input.value.trim();
      if(!text){
        showToast("Type a message first");
        return;
      }

      const now = new Date().toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
      const message = {
        initials: "DU",
        color: "#9a6df0",
        name: "You",
        time: now,
        text
      };

      chatData[currentTopic].messages.push(message);
      messagesEl.appendChild(buildMessage(message));
      messagesEl.scrollTop = messagesEl.scrollHeight;
      input.value = "";
      applySearch();
      showToast("Message sent");
    }

    sendBtn.addEventListener("click", sendMessage);

    input.addEventListener("keydown", e => {
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendMessage();
      }
    });

    clearBtn.addEventListener("click", () => {
      input.value = "";
      input.focus();
    });

    searchInput.addEventListener("input", applySearch);

    document.getElementById("newChatBtn").addEventListener("click", () => showToast("New chat opened"));
    document.getElementById("callBtn").addEventListener("click", () => showToast("Starting call"));
    document.getElementById("videoBtn").addEventListener("click", () => showToast("Starting video call"));
    document.getElementById("meetBtn").addEventListener("click", () => showToast("Meeting started"));

    renderChat("it-escalation");
  </script>
